<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doon Hospital</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<main>
  <div class="hero-text">
    <p>WE CARE ABOUT<br>YOUR <SPAN>HEALTH</SPAN></p>
  </div>
    <div>
      <p class="text2">doon hospital your one stop solution for entertainment</p>
    </div>
  
<nav>
  <div class="logo">
    <i class="fa-solid fa-hospital fa-2x" style="color: rgb(0,105,188);"></i>
    <p>Doon<br> <span>Hospital</span></p>
  </div>
  <div class="login-button">
    <button class="user login">Login</button>
    <button class="user">Register</button>
  </div>
</nav>

  <footer>
    <div class="fot home">
      <i class="fa-solid fa-house fa-2xl" style="color: rgb(252, 252, 252);"></i>
      <p>HOME</p>
    </div>
    <div class="fot department">
      <i class="fa-solid fa-building-user fa-2xl" style="color: rgb(252, 252, 252);"></i>
      <p>DEPARTMENTS</p>
    </div>
    <div class="fot about">
      <i class="fa-solid fa-circle-info fa-2xl" style="color: rgb(252, 252, 252);"></i>
      <p>ABOUT</p>
    </div>
    <div class="fot doctors">
      <i class="fa-solid fa-user-doctor fa-2xl" style="color: rgb(252, 252, 252);"></i>
      <p>DOCTORS</p>
    </div>
    <div class="fot contact">
      <i class="fa-solid fa-phone fa-2xl" style="color: rgb(252, 252, 252);"></i>
      <p>CONTACT</p>
    </div>
  </footer>
</main>
  
</body>
</html>
