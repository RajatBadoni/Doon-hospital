<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doon Hospital</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body bgcolor="#e1f2ff">

<main>
  <div class="hero-text">
    <p>WE CARE ABOUT<br>YOUR <SPAN>HEALTH</SPAN></p>
  </div>
    <div>
      <p class="text2">doon hospital your one stop solution for entertainment</p>
    </div>
  <div class="appointment">
    <p>Appointment</p>
    <i class="fa-solid fa-arrow-right" style="color: rgb(252, 252, 252);"></i>
  </div>
</main>
  
<nav>
  <div class="logo">
    <i class="fa-solid fa-hospital fa-2x" style="color: rgb(0,105,188);"></i>
    <p>Doon<br> <span>Hospital</span></p>
  </div>
  <div class="login-button">
    <button class="user login">Login</button>
    <button class="user">Register</button>
  </div>
</nav>

  <footer>
    <div class="fot home">
      <i class="fa-solid fa-house fa-2xl" style="color: rgb(252, 252, 252);"></i>
      <p>HOME</p>
    </div>
    <div class="fot department">
      <i class="fa-solid fa-building-user fa-2xl" style="color: rgb(252, 252, 252);"></i>
      <p>DEPARTMENTS</p>
    </div>
    <div class="fot about">
      <i class="fa-solid fa-circle-info fa-2xl" style="color: rgb(252, 252, 252);"></i>
      <p>ABOUT</p>
    </div>
    <div class="fot doctors">
      <i class="fa-solid fa-user-doctor fa-2xl" style="color: rgb(252, 252, 252);"></i>
      <p>DOCTORS</p>
    </div>
    <div class="fot contact">
      <i class="fa-solid fa-phone fa-2xl" style="color: rgb(252, 252, 252);"></i>
      <p>CONTACT</p>
    </div>
  </footer>

  <div class="services">
    <p><span>______our departments</span><br>OUR MEDICAL SERVICES</p>
  </div>

<div class="dep-boxes">
  <div class="box box1">
    <i class="fa-solid fa-tooth fa-4x" style="color: rgb(255, 255, 255);"></i>
    <p>Dental</p>
  </div>
  <div class="box box2">
    <i class="fa-solid fa-heart-crack fa-4x" style="color: rgb(255, 255, 255);"></i>
    <p>Cardiology</p>
  </div>
  <div class="box box3">
    <i class="fa-solid fa-ear-deaf fa-4x" style="color: rgb(255, 255, 255);"></i>
    <p>Eare wale</p>
  </div>
  <div class="box box4">
    <i class="fa-solid fa-lungs fa-4x" style="color: rgb(255, 255, 255);"></i>
    <p>Neorotomy</p>
  </div>
  <div class="box box5">
    <i class="fa-solid fa-bone fa-4x" style="color: rgb(255, 255, 255);"></i>
    <p>Bones</p>
  </div>
</div>

  <div class="space"></div>
</body>
</html>
